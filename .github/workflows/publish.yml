name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          package_json_file: does-not-exist.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish packages via OIDC-exchanged tokens
        run: |
          set -euo pipefail

          id_token=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r '.value')
          if [ -z "$id_token" ] || [ "$id_token" = "null" ]; then
            echo "::error::Failed to obtain a GitHub Actions OIDC ID token" >&2
            exit 1
          fi

          publish_pkg () {
            local name="$1"
            local escaped_name
            escaped_name=$(node -e 'console.log(encodeURIComponent(process.argv[1]))' "$name")
            local npm_token
            npm_token=$(curl -sf -X POST \
              -H "Authorization: Bearer $id_token" \
              -H "Content-Length: 0" \
              "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$escaped_name" | jq -r '.token')
            if [ -z "$npm_token" ] || [ "$npm_token" = "null" ]; then
              echo "::error::Failed to exchange OIDC token for $name" >&2
              return 1
            fi
            npm config set --location=user "//registry.npmjs.org/:_authToken" "$npm_token"
            trap 'npm config delete --location=user "//registry.npmjs.org/:_authToken"' RETURN
            pnpm --filter "$name" publish --access public --no-git-checks --provenance
          }

          publish_pkg "@vixeq/core"
          publish_pkg "@vixeq/react"
          publish_pkg "@vixeq/player-react"
