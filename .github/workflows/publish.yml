name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          package_json_file: does-not-exist.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Debug OIDC env
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then echo "REQUEST_TOKEN: present"; else echo "REQUEST_TOKEN: missing"; fi
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then echo "REQUEST_URL: present"; else echo "REQUEST_URL: missing"; fi

      - name: Publish @vixeq/core (pnpm ndjson diagnostic)
        working-directory: packages/core
        run: pnpm publish --access public --no-git-checks --provenance --reporter=ndjson 2>&1 || true
