name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Supported matrix for 1.0 (spec Section 10): Node.js 22 and 24.
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Check public API reports
        run: pnpm api:check

      - name: Behavior-matrix gate
        run: pnpm behavior:check

      - name: Smoke-test packed packages
        run: pnpm smoke:pack

      # Compatibility fixtures (spec Section 10): verify the spec's supported
      # minimum/alternate React and TypeScript versions independently of the
      # workspace's own React 19 / TypeScript 5.9 setup. Run on a single
      # Node-matrix leg only -- these exercise React/TS boundaries, not Node
      # itself, so running them on every Node version would be redundant.
      - name: React 18 compatibility fixture
        if: matrix.node-version == 22
        run: SMOKE_REACT_VERSION=18 pnpm smoke:pack

      - name: TypeScript minimum-version compatibility fixture
        if: matrix.node-version == 22
        run: SMOKE_TS_VERSION=5.5 pnpm smoke:pack

  e2e:
    # R3 (spec Section "Browser gates"): actual media-transport E2E in
    # Chromium, Firefox, and WebKit. A separate job (rather than a step in
    # `build`) because Playwright's browser install is heavy and orthogonal
    # to the Node-version matrix; runs once on a single Node version.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run browser E2E
        run: pnpm test:e2e
