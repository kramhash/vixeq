name: Deploy Examples

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build playground
        run: pnpm --filter vixeq-playground build

      - name: Build website-pulse example
        run: pnpm --filter vixeq-example-website-pulse build

      - name: Build cycling-workout example
        run: pnpm --filter vixeq-example-cycling-workout build

      - name: Build arrangement-demo example
        run: pnpm --filter vixeq-example-arrangement-demo build

      - name: Build docs site
        run: pnpm --filter vixeq-docs build:site

      - name: Assemble Pages artifact
        run: node scripts/build-pages.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
